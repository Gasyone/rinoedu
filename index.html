    <!-- 🌟 CORE FAILSAFE PROXIES 🌟 -->
    <script>
        // Ensure app never crashes due to missing icons or poorly loaded components
        window.Icons = new Proxy({}, {
            get: function (target, prop) {
                if (prop in target) return target[prop];
                if (typeof prop === 'string' && /^[A-Z]/.test(prop)) {
                    return function FallbackIcon(props) {
                        return React.createElement('div', {
                            className: "w-4 h-4 bg-slate-200 rounded animate-pulse " + (props.className || ''),
                            title: "Icon missing: " + prop
                        });
                    };
                }
                return undefined;
            }
        });

        window.Components = new Proxy({}, {
            get: function (target, prop) {
                if (prop in target) return target[prop];
                if (typeof prop === 'string' && /^[A-Z]/.test(prop)) {
                    return function FallbackComponent() {
                        return React.createElement('div', {
                            className: "flex items-center justify-center p-4 border border-dashed border-red-300 bg-red-50 text-red-500 rounded-xl text-xs font-bold w-full h-full",
                        }, "Tải module thất bại: " + prop);
                    };
                }
                return undefined;
            }
        });
    </script>
